<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powder Stock Check</title>
    <style>
        :root {
            --bg-color: #12141c;
            --card-bg: #1e2230;
            --text-main: #ffffff;
            --text-muted: #8a90a6;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --secondary: #4b5563;
            --border: #2d334a;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 16px; 
            max-width: 480px; 
            margin: auto; 
            background: var(--bg-color); 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        h2 { 
            margin: 0 0 8px 0; 
            color: var(--text-main); 
            font-size: 24px; 
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .queue-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        video, img { 
            width: 100%; 
            display: block; 
        }

        button, .btn-label { 
            display: block;
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 14px; 
            transition: all 0.2s ease;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-start:hover { background: var(--primary-hover); }
        
        .btn-snap { background: #e11d48; color: white; }
        .btn-snap:hover { background: #be123c; }
        
        .btn-upload { background: var(--secondary); color: white; }
        .btn-upload:hover { background: #374151; }
        
        .btn-submit { background: var(--success); color: white; }
        .btn-submit:hover { background: var(--success-hover); }

        label.input-heading { 
            display: block; 
            font-weight: 600; 
            margin-top: 24px; 
            font-size: 14px; 
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] { 
            width: 100%; 
            padding: 16px; 
            margin-top: 8px; 
            box-sizing: border-box; 
            border: 2px solid var(--border); 
            background: rgba(0,0,0,0.2);
            color: white;
            border-radius: 12px; 
            font-size: 22px; 
            font-weight: 700;
            text-align: center; 
        }
        input[type="number"]:focus { 
            border-color: var(--primary); 
            outline: none; 
            background: rgba(0,0,0,0.4);
        }

        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Powder Stock Check</h2>
        <div style="text-align: center;">
            <span id="queueStatus" class="queue-badge">All synced up</span>
        </div>
        
        <div id="cameraContainer" class="video-container" style="display:none;">
            <video id="video" autoplay playsinline></video>
        </div>
        
        <div id="previewContainer" class="video-container" style="display:none;">
            <img id="preview" />
        </div>
        
        <button id="startBtn" class="btn-start">Open Scanner Camera</button>
        <button id="snapBtn" class="btn-snap" style="display:none;">Capture Box Label</button>
        
        <label id="uploadLabel" for="fileInput" class="btn-label btn-upload">
            Upload from Photo Library
        </label>
        <input type="file" id="fileInput" accept="image/*">
        
        <div id="formSection" style="display:none;">
            <label for="qty" class="input-heading">Physical Weight (Kilos)</label>
            <input type="number" id="qty" placeholder="0.0" inputmode="decimal" step="any">
            <button id="submitBtn" class="btn-submit">Add to Queue & Next Scan</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const preview = document.getElementById('preview');
        const cameraContainer = document.getElementById('cameraContainer');
        const previewContainer = document.getElementById('previewContainer');
        const startBtn = document.getElementById('startBtn');
        const snapBtn = document.getElementById('snapBtn');
        const uploadLabel = document.getElementById('uploadLabel');
        const fileInput = document.getElementById('fileInput');
        const formSection = document.getElementById('formSection');
        const submitBtn = document.getElementById('submitBtn');
        const queueStatus = document.getElementById('queueStatus');
        
        let base64Img = "";
        let uploadQueue = [];
        let isProcessingQueue = false;

        const CLOUDFLARE_WORKER_URL = "https://fullpowderstockcheckv2.danleewright.workers.dev";

        // Step 1: Open camera lens on button click
        startBtn.addEventListener('click', () => {
            startBtn.innerText = "Initializing Lens...";
            startBtn.disabled = true;
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                    cameraContainer.style.display = "block";
                    snapBtn.style.display = "block";
                    startBtn.style.display = "none";
                    uploadLabel.style.display = "none";
                })
                .catch(err => {
                    alert("Camera integration blocked. Use manual upload option.");
                    startBtn.style.display = "none";
                });
        });

        // Step 2: Capture image frame
        snapBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            base64Img = canvas.toDataURL('image/jpeg');
            processSelectedImage(base64Img);
        });

        // Step 2 Alternative: File input mapping
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                base64Img = event.target.result;
                processSelectedImage(base64Img);
            };
            reader.readAsDataURL(file);
        });

        // Step 3: Turn off camera tracking and show input form
        function processSelectedImage(imgSrc) {
            preview.src = imgSrc;
            previewContainer.style.display = "block";
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            
            cameraContainer.style.display = "none";
            snapBtn.style.display = "none";
            startBtn.style.display = "none";
            uploadLabel.style.display = "none";
            formSection.style.display = "block";
        }

        // Step 4: Drop scanned item into memory queue and instantly reset UI
        submitBtn.addEventListener('click', () => {
            const qty = document.getElementById('qty').value;
            if(!qty || parseFloat(qty) < 0) return alert("Please enter a valid weight.");
            
            // Push data payload into queue array
            uploadQueue.push({ image: base64Img, qty: parseFloat(qty) });
            updateQueueBadge();

            // Fire off background upload processor without waiting for it
            processNextQueueItem();

            // INSTANTLY RESET UI FOR THE NEXT BOX
            base64Img = "";
            document.getElementById('qty').value = "";
            previewContainer.style.display = "none";
            formSection.style.display = "none";
            
            // Return straight back to the fresh open camera state
            startBtn.disabled = false;
            startBtn.innerText = "Open Scanner Camera";
            startBtn.style.display = "block";
            uploadLabel.style.display = "block";
        });

        // Update the status indicator badge at the top
        function updateQueueBadge() {
            const count = uploadQueue.length;
            if (count === 0) {
                queueStatus.innerText = "All synced up";
                queueStatus.style.background = "rgba(16, 185, 129, 0.2)";
                queueStatus.style.color = "#34d399";
                queueStatus.style.borderColor = "rgba(16, 185, 129, 0.3)";
            } else {
                queueStatus.innerText = `Uploading ${count} box${count > 1 ? 'es' : ''} in background...`;
                queueStatus.style.background = "rgba(245, 158, 11, 0.2)";
                queueStatus.style.color = "#fbbf24";
                queueStatus.style.borderColor = "rgba(245, 158, 11, 0.3)";
            }
        }

        // Asynchronous background processing pipeline loop
        async function processNextQueueItem() {
            if (isProcessingQueue || uploadQueue.length === 0) return;
            isProcessingQueue = true;

            const currentItem = uploadQueue[0];

            try {
                const response = await fetch(CLOUDFLARE_WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(currentItem)
                });
                
                const resData = await response.json();
                if(resData.status === "success") {
                    // Success: Remove the item from queue
                    uploadQueue.shift();
                } else {
                    console.error("Server execution rejected item:", resData.error);
                    alert("Error processing box label: " + resData.error + "\nRetrying in 5 seconds...");
                    await new Promise(r => setTimeout(r, 5000)); // wait before retrying
                }
            } catch (err) {
                console.error("Network upload drop:", err);
                await new Promise(r => setTimeout(r, 5000)); // connection failure timeout fallback
            }

            isProcessingQueue = false;
            updateQueueBadge();
            // Loop back to handle remaining queued data objects
            processNextQueueItem();
        }
    </script>
</body>
</html>
